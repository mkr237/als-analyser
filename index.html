<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALS Analyser</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">— Ableton Project Inspector</div>
    <h1>ALS <span>Analyser</span></h1>
    <p class="subtitle">Drop an Ableton Live Set (.als) to inspect its structure</p>
  </header>

  <div id="dropzone">
    <span class="drop-icon">⬡</span>
    <div class="drop-title">Drop your .als file here</div>
    <div class="drop-sub">or click to browse · works entirely in your browser · nothing is uploaded</div>
    <input type="file" id="fileInput" accept=".als">
  </div>

  <div id="results"></div>
</div>

<script src="analyser.js"></script>
</body>
</html>
